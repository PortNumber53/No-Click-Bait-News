name: no_click_bait_news
description: A no-clickbait news reader with infinite scroll.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.2.6
  shimmer: ^3.0.0
  intl: ^0.19.0
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
